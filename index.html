<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Security - Optimized</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2c3e50; --success: #2ecc71; --danger: #e74c3c; --accent: #3498db; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        #reader { width: 100%; max-width: 450px; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #ddd; overflow: hidden; }
        
        #result-card { display: none; margin-top: 20px; width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--success); }
        .emp-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #eee; background: #fafafa; }
        .info-label { color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .info-value { font-weight: bold; font-size: 1.3rem; color: var(--primary); margin-bottom: 5px; }
        
        #status-badge { display: inline-block; padding: 6px 20px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; }
        
        #remarks-section { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 15px; }
        .btn-confirm { background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; transition: transform 0.1s; }
        .btn-confirm:active { transform: scale(0.98); }
        
        .log-container { margin-top: 30px; width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.9rem; }
        .loading-overlay { display: none; color: var(--accent); font-weight: bold; margin: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h2 style="color: var(--primary); margin-bottom: 20px;">Gate Terminal</h2>
    
    <div id="reader"></div>
    <div id="loading" class="loading-overlay">⌛ Syncing with Sheets...</div>

    <div id="result-card">
        <div id="status-badge">...</div>
        <br>
        <img id="emp-img" class="emp-photo" src="" alt="Profile">
        <div class="info-label">Name</div>
        <div id="emp-name" class="info-value">-</div>
        <div class="info-label">Department</div>
        <div id="emp-dept" class="info-value">-</div>
        
        <div id="remarks-section">
            <input type="text" id="remarks-input" placeholder="Remarks (optional)">
            <button id="confirm-btn" class="btn-confirm">CONFIRM</button>
        </div>
    </div>

    <div class="log-container">
        <h3 style="margin:0">Today's Activity</h3>
        <table id="log-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <script>
        // REPLACE WITH YOUR APPS SCRIPT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSKEjX3OwaYs7Ba5_AVdZbJ6JHOx8bH-vljFynDKyXVFDd5nMk2-Wo0v2XwrcHow2PGA/exec";

        // Performance Optimized Config
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, // Lowered to 15 to prevent mobile CPU lag
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0,
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 640 }, // Optimized resolution
                height: { ideal: 480 }
            },
            formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] 
        });
        
        let currentEmployee = null;

        function onScanSuccess(decodedText) {
            // Instant feedback
            if (navigator.vibrate) navigator.vibrate(100); 

            if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.SCANNING) {
                html5QrcodeScanner.pause();
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result-card').style.display = 'none';
            
            fetch(`${SCRIPT_URL}?id=${decodedText}`)
            .then(response => response.text())
            .then(text => {
                document.getElementById('loading').style.display = 'none';
                const data = JSON.parse(text);
                
                if (data.found) {
                    const nextAction = (data.lastStatus === "IN") ? "OUT" : "IN";
                    
                    currentEmployee = { 
                        id: decodedText, 
                        name: data.name, 
                        dept: data.dept, 
                        photo: data.photo,
                        action: nextAction 
                    };
                    
                    document.getElementById('emp-name').innerText = data.name;
                    document.getElementById('emp-dept').innerText = data.dept;
                    document.getElementById('emp-img').src = data.photo || "https://via.placeholder.com/150?text=No+Photo";
                    
                    const badge = document.getElementById('status-badge');
                    const card = document.getElementById('result-card');
                    badge.innerText = "NEXT: " + nextAction;
                    
                    if(nextAction === "IN") {
                        badge.style.backgroundColor = "var(--success)";
                        card.style.borderTopColor = "var(--success)";
                    } else {
                        badge.style.backgroundColor = "var(--danger)";
                        card.style.borderTopColor = "var(--danger)";
                    }

                    card.style.display = 'block';
                } else {
                    alert("ID Error: " + decodedText);
                    resumeScanner();
                }
            })
            .catch(err => {
                alert("Network timeout. Please refresh.");
                document.getElementById('loading').style.display = 'none';
                resumeScanner();
            });
        }

        document.getElementById('confirm-btn').addEventListener('click', function() {
            if (!currentEmployee) return;

            const logEntry = {
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                name: currentEmployee.name,
                id: currentEmployee.id,
                action: currentEmployee.action,
                remarks: document.getElementById('remarks-input').value || "None"
            };

            updateTable(logEntry);

            // POST to Google
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(logEntry)
            });

            document.getElementById('result-card').style.display = 'none';
            document.getElementById('remarks-input').value = "";
            resumeScanner();
            currentEmployee = null;
        });

        function resumeScanner() {
            if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
                html5QrcodeScanner.resume();
            }
        }

        function updateTable(log) {
            const body = document.getElementById('log-body');
            const row = `<tr>
                <td>${log.time}</td>
                <td>${log.name}</td>
                <td style="color:${log.action === 'IN' ? 'green' : 'red'}"><b>${log.action}</b></td>
            </tr>`;
            body.insertAdjacentHTML('afterbegin', row);
        }

        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
