<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security ID System v2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2c3e50; --success: #2ecc71; --accent: #3498db; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #reader { width: 100%; max-width: 450px; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        #result-card { display: none; margin-top: 20px; width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--success); }
        .emp-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #eee; background: #fafafa; }
        .info-label { color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .info-value { font-weight: bold; font-size: 1.3rem; color: var(--primary); margin-bottom: 10px; }
        
        #remarks-section { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; margin-bottom: 15px; }
        .btn-confirm { background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
        
        .log-container { margin-top: 30px; width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.9rem; }
        .loading-overlay { display: none; color: var(--accent); font-weight: bold; margin: 10px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h2>Gate Checkpoint</h2>
    
    <div id="reader"></div>
    <div id="loading" class="loading-overlay">Checking Database...</div>

    <div id="result-card">
        <img id="emp-img" class="emp-photo" src="" alt="Profile">
        <div class="info-label">Employee Name</div>
        <div id="emp-name" class="info-value">-</div>
        <div class="info-label">Department</div>
        <div id="emp-dept" class="info-value">-</div>
        
        <div id="remarks-section">
            <input type="text" id="remarks-input" placeholder="Optional: Add remarks/notes">
            <button id="confirm-btn" class="btn-confirm">CONFIRM & LOG</button>
        </div>
    </div>

    <div class="log-container">
        <h3 style="margin:0">Recent Scans</h3>
        <table id="log-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <script>
        // 1. PASTE YOUR GOOGLE WEB APP URL HERE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSKEjX3OwaYs7Ba5_AVdZbJ6JHOx8bH-vljFynDKyXVFDd5nMk2-Wo0v2XwrcHow2PGA/exec";

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        let currentEmployee = null;
        let scanLogs = [];

        function onScanSuccess(decodedText) {
            // FIX: Check state before pausing to avoid the "Cannot pause" error
            if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.SCANNING) {
                html5QrcodeScanner.pause();
            }

            document.getElementById('loading').style.display = 'block';
            
fetch(`${SCRIPT_URL}?id=${decodedText}`, {
    method: 'GET',
    redirect: 'follow' // This tells the browser to follow Google's internal redirect
})
                    
                    if (data.found) {
                        currentEmployee = { id: decodedText, name: data.name, dept: data.dept, photo: data.photo };
                        
                        document.getElementById('emp-name').innerText = data.name;
                        document.getElementById('emp-dept').innerText = data.dept;
                        document.getElementById('emp-img').src = data.photo || "https://via.placeholder.com/150?text=No+Photo";
                        document.getElementById('remarks-input').value = "";
                        document.getElementById('result-card').style.display = 'block';
                    } else {
                        alert("Employee ID Not Found: " + decodedText);
                        resumeScanner();
                    }
                })
                .catch(err => {
                    alert("Network Error. Check internet connection.");
                    document.getElementById('loading').style.display = 'none';
                    resumeScanner();
                });
        }

        function resumeScanner() {
            if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
                html5QrcodeScanner.resume();
            }
        }

        document.getElementById('confirm-btn').addEventListener('click', function() {
            if (!currentEmployee) return;

            const remarks = document.getElementById('remarks-input').value;
            const lastLog = scanLogs.filter(l => l.id === currentEmployee.id).pop();
            const action = (!lastLog || lastLog.action === "OUT") ? "IN" : "OUT";

            const logEntry = {
                time: new Date().toLocaleTimeString(),
                name: currentEmployee.name,
                id: currentEmployee.id,
                action: action,
                remarks: remarks || "None"
            };

            // Add to local UI
            scanLogs.push(logEntry);
            updateTable(logEntry);

            // Send to Google Sheets
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(logEntry)
            });

            // Reset UI
            document.getElementById('result-card').style.display = 'none';
            resumeScanner();
            currentEmployee = null;
        });

        function updateTable(log) {
            const body = document.getElementById('log-body');
            const row = `<tr>
                <td>${log.time}</td>
                <td>${log.name}</td>
                <td style="color:${log.action === 'IN' ? 'green' : 'red'}"><b>${log.action}</b></td>
            </tr>`;
            body.insertAdjacentHTML('afterbegin', row);
        }

        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>

</html>
